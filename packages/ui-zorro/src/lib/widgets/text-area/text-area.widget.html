<ng-template let-control="control" let-schema="schema" let-model="model" [fluentContextGuard]="contextGuard">
  @let hasWrapper = schema.clearable;
  @let hasControlWrapper = ControlWrapperDirective | inject: { optional: true };

  @if (!(schema.hidden | reactive: model : schema : control)) {
    @if (hasWrapper) {
      <nz-input-wrapper
        [fluentCol]="hasControlWrapper"
        [span]="schema.col | col: 'span'"
        [flex]="schema.col | col: 'flex'"
        [offset]="schema.col | col: 'offset'"
        [class]="schema.class | reactive: model : schema : control | class"
        [style]="schema.style | reactive: model : schema : control | style"
        [nzAllowClear]="schema.clearable">
        <textarea
          nz-input
          [attr.id]="schema.id"
          [attr.name]="schema.key"
          [attr.maxlength]="helper.length.max | invoke: schema.length"
          [attr.minlength]="helper.length.min | invoke: schema.length"
          [fluentBinding]="{ schema, control, model }"
          [formControl]="control"
          [nzAutosize]="schema.autosize ?? {}"
          [placeholder]="(schema.placeholder | reactive: model : schema : control) ?? ''"
          [rows]="schema.rows"
          [autofocus]="schema.autofocus"
          [readonly]="schema.readonly | reactive: model : schema : control"
          [nzSize]="schema.size!"
          [nzStatus]="(control | status)()"
          [nzVariant]="schema.variant ?? 'outlined'"></textarea>
      </nz-input-wrapper>
    } @else {
      <textarea
        nz-input
        [fluentCol]="hasControlWrapper"
        [attr.id]="schema.id"
        [attr.name]="schema.key"
        [attr.maxlength]="helper.length.max | invoke: schema.length"
        [attr.minlength]="helper.length.min | invoke: schema.length"
        [fluentBinding]="{ schema, control, model }"
        [formControl]="control"
        [class]="schema.class | reactive: model : schema : control | class"
        [style]="schema.style | reactive: model : schema : control | style"
        [span]="schema.col | col: 'span'"
        [flex]="schema.col | col: 'flex'"
        [offset]="schema.col | col: 'offset'"
        [nzAutosize]="schema.autosize ?? {}"
        [placeholder]="(schema.placeholder | reactive: model : schema : control) ?? ''"
        [rows]="schema.rows"
        [autofocus]="schema.autofocus"
        [readonly]="schema.readonly | reactive: model : schema : control"
        [nzSize]="schema.size!"
        [nzStatus]="(control | status)()"
        [nzVariant]="schema.variant ?? 'outlined'"></textarea>
    }
  }
</ng-template>
